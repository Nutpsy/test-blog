<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>内陆帝国 // 碎屑</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Serif+SC:wght@400;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <style>
    .archive-page { background: var(--black); min-height: 100vh; padding: 6rem 3rem; }
    .archive-nav { display:flex; align-items:center; gap:1.5rem; margin-bottom:4rem; }
    .archive-nav-back { font-weight:700; border:2px solid var(--yellow); color:var(--yellow); padding:0.4rem 1rem; transition: all .2s; }
    .archive-nav-back:hover { background: var(--yellow); color: var(--black); }
    .archive-nav-title { font-family:'Archivo Black',sans-serif; font-size:1.6rem; color:var(--yellow); letter-spacing:0.1em; }
    .archive-ie-grid { column-count: 4; column-gap: 1rem; }
    .archive-ie-item { break-inside: avoid; margin-bottom: 1rem; position: relative; overflow: hidden; background: var(--paper); }
    .archive-ie-item img { width: 100%; height: auto; display: block; max-width: 100%; }
    .archive-ie-category { position: absolute; top: .5rem; left: .5rem; background: var(--yellow); color: var(--black); font-size: .7rem; font-weight: 700; padding: 2px 8px; text-transform: uppercase; letter-spacing: .05em; }
    .archive-ie-caption { position: absolute; bottom: 0; left: 0; right: 0; padding: .75rem; background: linear-gradient(to top, rgba(26,26,26,0.9), transparent); color: var(--white); font-size: .85rem; transform: translateY(100%); transition: transform .3s; }
    .archive-ie-item:hover .archive-ie-caption { transform: translateY(0); }
    .archive-empty { color:var(--gray); font-size:1.1rem; }
    @media (max-width: 1024px) { .archive-ie-grid { column-count: 3; } }
    @media (max-width: 768px) { .archive-ie-grid { column-count: 2; } }
    @media (max-width: 480px) { .archive-ie-grid { column-count: 1; } }
  </style>
</head>
<body>
  <div class="archive-page">
    <nav class="archive-nav"></nav>
    <div class="archive-ie-grid" id="archive-content"></div>
  </div>
  <script src="../data.js"></script>
  <script src="archive.js"></script>
  <script>document.addEventListener('DOMContentLoaded', () => ArchiveApp.init('inland-empire'));</script>
</body>
</html>
