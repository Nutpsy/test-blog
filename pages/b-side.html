<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B-SIDE // 碎屑</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Serif+SC:wght@400;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <style>
    .archive-page { background: var(--black); min-height: 100vh; padding: 6rem 3rem; }
    .archive-nav { display:flex; align-items:center; gap:1.5rem; margin-bottom:4rem; }
    .archive-nav-back { font-weight:700; border:2px solid var(--yellow); color:var(--yellow); padding:0.4rem 1rem; transition: all .2s; }
    .archive-nav-back:hover { background: var(--yellow); color: var(--black); }
    .archive-nav-title { font-family:'Archivo Black',sans-serif; font-size:1.6rem; color:var(--red); letter-spacing:0.1em; }
    .archive-bs-item { background: rgba(255,255,255,.05); padding: 1.5rem; border-left: 3px solid var(--yellow); margin-bottom: 1.5rem; }
    .archive-bs-date { font-size:.8rem; color:var(--yellow); display:block; margin-bottom:.5rem; }
    .archive-bs-item p { color: var(--white); line-height: 1.8; }
    .archive-empty { color:var(--gray); font-size:1.1rem; }
    .archive-bs-lock { display:flex; align-items:center; justify-content:center; min-height:40vh; }
    .archive-bs-lock-panel { background: var(--paper); padding: 3rem; border: 3px solid var(--black); text-align:center; max-width: 360px; width: 90%; }
    .archive-bs-lock-panel h3 { font-family:'Archivo Black',sans-serif; font-size:1.4rem; color:var(--red); margin-bottom:1.5rem; letter-spacing:.1em; }
    .archive-bs-lock-panel input { width:100%; padding:.8rem; font-size:1.2rem; text-align:center; letter-spacing:.5em; border:2px solid var(--black); background:var(--white); margin-bottom:.5rem; outline:none; }
    .archive-bs-lock-panel input:focus { border-color: var(--red); }
    .archive-bs-hint { font-size:.8rem; color:var(--gray); margin-bottom:1.5rem; }
    .archive-bs-lock-panel button { background: var(--black); color: var(--yellow); border:none; padding:.8rem 2rem; font-weight:700; letter-spacing:.15em; cursor:pointer; transition: background .2s; }
    .archive-bs-lock-panel button:hover { background: var(--red); color: var(--white); }
  </style>
</head>
<body>
  <div class="archive-page">
    <nav class="archive-nav"></nav>
    <div id="archive-content"></div>
  </div>
  <script src="../data.js"></script>
  <script src="archive.js"></script>
  <script>document.addEventListener('DOMContentLoaded', () => ArchiveApp.init('b-side'));</script>
</body>
</html>
